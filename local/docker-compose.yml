name: logistics-platform

services:
  postgres:
    image: postgres:16-alpine
    container_name: logistics-postgres
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data # Так контейнер НЕ использует анонимный volume, который удаляется при docker-compose down -v
      - ./postgres:/docker-entrypoint-initdb.d
    healthcheck: # Проверка готовности PostgreSQL принимать запросы
      test: [ "CMD-SHELL", "pg_isready -U postgres -d postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # MongoDB
  mongodb:
    image: mongo:7
    container_name: logistics-mongodb
    environment:
#      MONGO_INITDB_ROOT_USERNAME: root  # 👈 ЗАКОММЕНТИРОВАЛ для разработки, потом включу (без аутентификации для разработки)
#      MONGO_INITDB_ROOT_PASSWORD: root
      MONGO_INITDB_DATABASE: logistics_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db   # 👈именую volume
    healthcheck: # Проверка готовности MongoDB
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  mongo_data: