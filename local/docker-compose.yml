name: logistics-platform

services:

  # 🐘 Единая PostgreSQL для всей логистической платформы
  postgres:
    image: postgres:16-alpine
    container_name: logistics-postgres_db
    environment:
      - POSTGRES_DB=logistics_platform_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - TZ=Europe/Moscow  # 👈 ПОСТГРЕС в часовой пояс МСК (GMT+3)
    ports:
      - "5433:5432"  # 👈 1. Изменили ВНЕШНИЙ порт на 5433 для предотвращения конфликтов
    volumes:
      - postgres_data:/var/lib/postgresql/data # Так контейнер НЕ использует анонимный volume, который удаляется при docker-compose down -v
      - ./postgres:/docker-entrypoint-initdb.d
    healthcheck: # Проверка готовности PostgreSQL принимать запросы
      test: [ "CMD-SHELL", "pg_isready -U postgres -d logistics_platform_db" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # 🐘 Веб-интерфейс для PostgreSQL и MongoDB (без авто-подключений)
  dbgate:
    image: dbgate/dbgate:latest
    container_name: logistics-dbgate
    environment:
      # Таймзона
      - TZ=Europe/Moscow
    ports:
      - "5051:3000"
    volumes:
      - dbgate_data:/root/.dbgate
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy

  # 🍃 MongoDB для документов и картинок Cargo Service
  mongodb:
    image: mongo:7
    container_name: logistics-mongo_db
    environment:
#      - MONGO_INITDB_ROOT_USERNAME=root  # 👈 ЗАКОММЕНТИРОВАЛ для разработки, потом включу (без аутентификации для разработки)
#      - MONGO_INITDB_ROOT_PASSWORD=root
      - MONGO_INITDB_DATABASE=logistics_cargo_mongo_db  # 👈 1. Поменяли имя дефолтной БД
      - TZ=Europe/Moscow        # 👈 НАУЧИТ МОНГУ ВРЕМЕНИ МСК (GMT+3)
    ports:
      - "27018:27017"  # 👈 2. Поменяли ВНЕШНИЙ порт на 27018. Внутри контейнера всегда 27017.
    volumes:
      - mongo_data:/data/db   # 👈именую volume
    healthcheck: # Проверка готовности MongoDB
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 🔐 Инфраструктура Keycloak
  postgres-keycloak:
    image: postgres:16-alpine
    container_name: logistics-postgres-keycloak
    environment:
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_DB=keycloak
      - TZ=Europe/Moscow        # 👈 ПОСТГРЕС в часовой пояс МСК (GMT+3)
    ports:
      - "5434:5432"
    volumes:
      - postgres_keycloak_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.0.7
    container_name: logistics-keycloak
    depends_on:
      postgres-keycloak:
        condition: service_healthy # Keycloak честно дождется готовности базы!
    command: [ "start-dev", "--import-realm" ]
    ports:
      - "8080:8080"
    environment:
      - TZ=Europe/Moscow      # 👈 КЕЙКЛОК в часовой пояс МСК (GMT+3)
      - KC_BOOTSTRAP_ADMIN_USERNAME=admin
      - KC_BOOTSTRAP_ADMIN_PASSWORD=admin
      - KC_DB=postgres
      - KC_DB_URL_HOST=postgres-keycloak
      - KC_DB_URL_PORT=5432
      - KC_DB_URL_DATABASE=keycloak
      - KC_DB_USERNAME=postgres
      - KC_DB_PASSWORD=postgres
    volumes:
      - ./keycloak/realms:/opt/keycloak/data/import
      - ./keycloak/exports:/tmp/keycloak-export

  # 📨 Kafka Broker в режиме KRaft (без ZooKeeper)
  kafka:
    image: apache/kafka:latest  # 👈 Официальный образ от Apache
    container_name: logistics-kafka
    ports:
      - "9092:9092"
    environment:
      # ======== НАСТРОЙКИ РЕЖИМА KRaft ========
      # Уникальный ID узла в кластере
      - KAFKA_NODE_ID=1

      # Роли: controller (управление кластером) + broker (обработка сообщений)
      - KAFKA_PROCESS_ROLES=controller,broker

      # Список узлов, которые могут участвовать в выборах лидера
      # Формат: id@hostname:port (для одного узла)
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093

      # ======== НАСТРОЙКИ СЛУШАТЕЛЕЙ ========
      # На каких адресах и портах слушает Kafka
      # - PLAINTEXT://:9092 - для клиентских подключений
      # - CONTROLLER://:9093 - для внутреннего общения контроллеров
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093

      # Как клиенты обращаются к Kafka (снаружи через localhost)
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://localhost:9092

      # Сопоставление протоколов с именами слушателей
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT

      # Имя слушателя для контроллера
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER

      # Имя слушателя для общения между брокерами
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT

      # ======== НАСТРОЙКИ ХРАНЕНИЯ ========
      # Коэффициент репликации для системных топиков (для одного узла = 1)
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1

      # Автоматическое создание топиков при первой отправке сообщения
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true

      # Путь для хранения логов (должен совпадать с volume)
      - KAFKA_LOG_DIRS=/var/lib/kafka/data

      # Таймзона
      - TZ=Europe/Moscow
    volumes:
      - kafka_data:/var/lib/kafka/data
    user: "1000:1000"  # 🟢 Запускаем от пользователя с правами
    healthcheck:
#      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/9092 || exit 1"]
      test: [ "CMD-SHELL", "nc -z localhost 9092 || exit 1" ]
      interval: 10s
      timeout: 10s
      retries: 5

  # 📊 Веб-интерфейс для мониторинга Kafka
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: logistics-kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8090:8080"
    environment:
      - KAFKA_CLUSTERS_0_NAME=local
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:9092
      - TZ=Europe/Moscow

volumes:
  postgres_data:
  mongo_data:
  postgres_keycloak_data:
  dbgate_data:
  kafka_data:
