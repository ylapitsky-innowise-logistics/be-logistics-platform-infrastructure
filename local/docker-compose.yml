name: logistics-platform

services:

  # 🐘 Единая PostgreSQL для всей логистической платформы
  postgres:
    image: postgres:16-alpine
    container_name: logistics-postgres_db
    environment:
      - POSTGRES_DB=logistics_platform_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - TZ=Europe/Moscow  # 👈 ПОСТГРЕС в часовой пояс МСК (GMT+3)
    ports:
      - "5433:5432"  # 👈 1. Изменили ВНЕШНИЙ порт на 5433 для предотвращения конфликтов
    volumes:
      - postgres_data:/var/lib/postgresql/data # Так контейнер НЕ использует анонимный volume, который удаляется при docker-compose down -v
      - ./postgres:/docker-entrypoint-initdb.d
    healthcheck: # Проверка готовности PostgreSQL принимать запросы
      test: [ "CMD-SHELL", "pg_isready -U postgres -d logistics_platform_db" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # 🐘 Веб-интерфейс для PostgreSQL и MongoDB (без авто-подключений)
  dbgate:
    image: dbgate/dbgate:latest
    container_name: logistics-dbgate
    environment:
#      # Подключение к PostgreSQL
#      # Идентификаторы слотов в верхнем регистре
#      - CONNECTIONS=POSTGRES,MONGO
#
#      # 🎯 Слот №1: PostgreSQL
#      - LABEL_POSTGRES=PostgreSQL
#      - ENGINE_POSTGRES=postgres        # 👈 СТРОГО 'postgres' (внутренний ID драйвера в DbGate)
#      - SERVER_POSTGRES=postgres
#      - PORT_POSTGRES=5432
#      - USER_POSTGRES=postgres
#      - PASSWORD_POSTGRES=postgres
#      - DATABASE_POSTGRES=logistics_platform_db
#
#      # 🎯 Слот №2: MongoDB
#      - LABEL_MONGO=MongoDB
#      - ENGINE_MONGO=mongo            # 👈 СТРОГО 'mongo' (внутренний ID драйвера в DbGate)
#      - SERVER_MONGO=mongodb
#      - PORT_MONGO=27017
#      - USER_MONGO=
#      - PASSWORD_MONGO=
#      - DATABASE_MONGO=logistics_cargo_mongo_db
#      - AUTH_SOURCE_MONGO=admin

      # Таймзона
      - TZ=Europe/Moscow
    ports:
      - "5051:3000"
    volumes:
      - dbgate_data:/root/.dbgate
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy

  # 🍃 MongoDB для документов и картинок Cargo Service
  mongodb:
    image: mongo:7
    container_name: logistics-mongo_db
    environment:
#      - MONGO_INITDB_ROOT_USERNAME=root  # 👈 ЗАКОММЕНТИРОВАЛ для разработки, потом включу (без аутентификации для разработки)
#      - MONGO_INITDB_ROOT_PASSWORD=root
      - MONGO_INITDB_DATABASE=logistics_cargo_mongo_db  # 👈 1. Поменяли имя дефолтной БД
      - TZ=Europe/Moscow        # 👈 НАУЧИТ МОНГУ ВРЕМЕНИ МСК (GMT+3)
    ports:
      - "27018:27017"  # 👈 2. Поменяли ВНЕШНИЙ порт на 27018. Внутри контейнера всегда 27017.
    volumes:
      - mongo_data:/data/db   # 👈именую volume
    healthcheck: # Проверка готовности MongoDB
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 🟢 Веб-админка для MongoDB (Доступна в браузере)
  mongo-express:
    image: mongo-express:latest
    container_name: logistics-mongo-express
    restart: always
    depends_on:
      mongodb:
        condition: service_healthy # Ждем, пока Mongo успешно пройдет свой пинг-тест
    ports:
      - "8888:8081" # Порт, который будем открывать в браузере
    environment:
      - ME_CONFIG_MONGODB_SERVER=mongodb # Строго имя сервиса из compose
      - ME_CONFIG_MONGODB_PORT=27017 # 👈 Здесь ОСТАЕТСЯ 27017, т.к. админка общается с Mongo внутри сети Docker напрямую

      # 🟢 ОТКЛЮЧАЕМ ТРЕБОВАНИЕ ПАРОЛЯ ПРИ ВХОДЕ В БРАУЗЕР (для разработки) // по умолчанию: Username:admin Password:pass
      - ME_CONFIG_BASICAUTH=false
      - TZ=Europe/Moscow

  # 🔐 Инфраструктура Keycloak
  postgres-keycloak:
    image: postgres:16-alpine
    container_name: logistics-postgres-keycloak
    environment:
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_DB=keycloak
      - TZ=Europe/Moscow        # 👈 ПОСТГРЕС в часовой пояс МСК (GMT+3)
    ports:
      - "5434:5432"
    volumes:
      - postgres_keycloak_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.0.7
    container_name: logistics-keycloak
    depends_on:
      postgres-keycloak:
        condition: service_healthy # Keycloak честно дождется готовности базы!
    command: [ "start-dev", "--import-realm" ]
    ports:
      - "8080:8080"
    environment:
      - TZ=Europe/Moscow      # 👈 КЕЙКЛОК в часовой пояс МСК (GMT+3)
      - KC_BOOTSTRAP_ADMIN_USERNAME=admin
      - KC_BOOTSTRAP_ADMIN_PASSWORD=admin
      - KC_DB=postgres
      - KC_DB_URL_HOST=postgres-keycloak
      - KC_DB_URL_PORT=5432
      - KC_DB_URL_DATABASE=keycloak
      - KC_DB_USERNAME=postgres
      - KC_DB_PASSWORD=postgres
    volumes:
      - ./keycloak/realms:/opt/keycloak/data/import
      - ./keycloak/exports:/tmp/keycloak-export

volumes:
  postgres_data:
  mongo_data:
  postgres_keycloak_data:
  dbgate_data:
